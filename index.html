<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Programming Cub</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="top-bar">
        <div class="terminal-dots">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
        </div>
        <div class="terminal-path">~/ProgrammingCub</div>
        <div class="terminal-status">online</div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" data-page="news">📰<span>Новости</span></button>
        <button class="nav-btn" data-page="homework">📚<span>ДЗ</span></button>
        <button class="nav-btn" data-page="top">🏆<span>Топ</span></button>
        <button class="nav-btn" data-page="profile">👤<span>Профиль</span></button>
    </div>

    <div class="container">
        <!-- НОВОСТИ -->
        <div id="page-news" class="page active">
            <div class="news-list" id="news-list">
                <!-- Новости загружаются из JS -->
            </div>
        </div>

        <!-- ДЗ (только для чтения) -->
        <div id="page-homework" class="page">
            <div id="homework-content">
                <!-- ДЗ загружается из data.js -->
            </div>
            <div class="info-box">
                ⚡ Сдать задание можно в боте: @ProgClubBot_bot
            </div>
        </div>

        <!-- ТОП -->
        <div id="page-top" class="page">
            <div class="section-header"><h2>🏆 Таблица лидеров</h2></div>
            <div id="top-list" class="top-list"></div>
        </div>

        <!-- ПРОФИЛЬ -->
        <div id="page-profile" class="page">
            <div class="profile-card">
                <div class="avatar">👤</div>
                <h2 id="user-name">Загрузка...</h2>
                <div class="rank-badge" id="user-rank">🥚 Новичок</div>
                <div class="exp-bar"><div class="exp-fill" id="exp-fill" style="width:0%"></div></div>
                <div class="exp-text" id="exp-text">0 опыта</div>
                <div class="stats-grid">
                    <div class="stat">🏆 Очки<br><span id="user-points">0</span></div>
                    <div class="stat">📚 Сдано ДЗ<br><span id="user-hw-done">0</span></div>
                    <div class="stat">⭐ Уровень<br><span id="user-level">1</span></div>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
