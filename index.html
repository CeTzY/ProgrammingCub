<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Programming Cub | // код и сообщество</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="top-bar">
        <div class="terminal-dots">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
        </div>
        <div class="terminal-path">~/ProgrammingCub</div>
        <div class="terminal-status">online</div>
    </div>

    <!-- НАВИГАЦИЯ СТРАНИЦ -->
    <div class="nav-tabs">
        <button class="nav-tab active" data-page="home">🏠 Главная</button>
        <button class="nav-tab" data-page="lessons">📚 Уроки</button>
        <button class="nav-tab" data-page="top">🏆 Топ</button>
        <button class="nav-tab" data-page="profile">👤 Профиль</button>
    </div>

    <!-- СТРАНИЦА 1: ГЛАВНАЯ (ДЗ) -->
    <div id="page-home" class="page active">
        <div class="hero-mini">
            <div class="terminal-mini">
                <div class="terminal-header">$ python --version</div>
                <div class="terminal-body-mini" id="hw-content">
                    Загрузка...
                </div>
            </div>
        </div>
        <div class="submit-section">
            <h3>📤 Сдать ДЗ</h3>
            <div class="level-buttons">
                <button class="level-btn" data-level="1">🟢 Уровень 1</button>
                <button class="level-btn" data-level="2">🟡 Уровень 2</button>
                <button class="level-btn" data-level="3">🔴 Уровень 3</button>
            </div>
            <textarea id="code-input" placeholder="Вставь сюда свой код..." rows="6"></textarea>
            <button id="submit-code-btn" class="submit-btn">🚀 Отправить на проверку</button>
        </div>
    </div>

    <!-- СТРАНИЦА 2: УРОКИ -->
    <div id="page-lessons" class="page">
        <div class="section-header">
            <h2>📚 Все уроки Python</h2>
        </div>
        <div class="lessons-grid" id="lessons-list">
            <!-- Список уроков будет загружен из JS -->
        </div>
    </div>

    <!-- СТРАНИЦА 3: ТОП УЧЕНИКОВ -->
    <div id="page-top" class="page">
        <div class="section-header">
            <h2>🏆 Таблица лидеров</h2>
        </div>
        <div id="top-list" class="top-list">
            Загрузка...
        </div>
    </div>

    <!-- СТРАНИЦА 4: ПРОФИЛЬ -->
    <div id="page-profile" class="page">
        <div class="profile-card">
            <div class="avatar" id="user-avatar">👤</div>
            <h2 id="user-name">Загрузка...</h2>
            <div class="rank-badge" id="user-rank">🥚 Новичок</div>
            <div class="exp-bar-container">
                <div class="exp-bar">
                    <div class="exp-fill" id="exp-fill" style="width: 0%"></div>
                </div>
                <div class="exp-text" id="exp-text">0 / 0 опыта</div>
            </div>
            <div class="stats-grid-mini">
                <div class="stat-mini">🏆 <span id="user-points">0</span> очков</div>
                <div class="stat-mini">📚 <span id="user-hw-done">0</span> ДЗ сдано</div>
                <div class="stat-mini">⭐ <span id="user-level">1</span> уровень</div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Programming Cub | created by CeTzY</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
